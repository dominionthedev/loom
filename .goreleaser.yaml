version: 2

project_name: loom

before:
  hooks:
    - go mod tidy

builds:
  - id: loom
    main: ./
    binary: loom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dominionthedev/loom/cmd.Version={{.Version}}

archives:
  - id: loom
    builds: [loom]
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore(deps)"
